<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夢プロジェクト｜交野市PTA協議会 夏休みの宿題</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--sky:#0ea5e9;--deep:#0c4a6e;--gold:#fbbf24;--coral:#f97316;--mint:#10b981;--soft:#f0f9ff;--ink:#0f172a;}
html{scroll-behavior:smooth;}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--deep);color:#fff;min-height:100vh;overflow-x:hidden;}

/* 星空背景 */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at top,#0c4a6e 0%,#020617 60%);}
.stars::before,.stars::after{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 80% 10%,#fff 0%,transparent 100%),radial-gradient(1.5px 1.5px at 40% 60%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 60% 80%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 10% 70%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 90% 50%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 50% 20%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1px 1px at 30% 90%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(2px 2px at 70% 40%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 15% 45%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 85% 75%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 55% 55%,#fff 0%,transparent 100%);}
.stars::after{animation:twinkle 4s ease-in-out infinite alternate;background-image:radial-gradient(1px 1px at 25% 15%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1px 1px at 75% 25%,#fff 0%,transparent 100%),radial-gradient(1.5px 1.5px at 45% 85%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 65% 35%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 35% 65%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(2px 2px at 95% 15%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 5% 55%,#fff 0%,transparent 100%);}
@keyframes twinkle{from{opacity:.5;}to{opacity:1;}}

.container{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:3rem 1.5rem 4rem;text-align:center;}
.badge{display:inline-block;background:rgba(251,191,36,.15);border:1.5px solid rgba(251,191,36,.5);color:var(--gold);font-size:.75rem;font-weight:700;padding:.35rem 1rem;border-radius:30px;letter-spacing:.1em;margin-bottom:1.5rem;animation:fadeDown .8s ease both;}
.main-title{font-family:'Kaisei Decol',serif;font-size:clamp(2rem,8vw,3.5rem);font-weight:900;line-height:1.2;margin-bottom:.8rem;animation:fadeDown .8s .1s ease both;background:linear-gradient(135deg,#fff 0%,var(--gold) 50%,#fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub-title{font-size:clamp(1rem,3vw,1.4rem);color:rgba(255,255,255,.85);margin-bottom:.5rem;animation:fadeDown .8s .2s ease both;line-height:1.7;}
.org-name{font-size:.85rem;color:rgba(255,255,255,.55);margin-bottom:2.5rem;animation:fadeDown .8s .3s ease both;}
.theme-card{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:2rem 1.5rem;margin-bottom:2.5rem;animation:fadeUp .8s .4s ease both;}
.theme-emoji{font-size:2.5rem;margin-bottom:.8rem;display:block;}
.theme-heading{font-family:'Kaisei Decol',serif;font-size:1.3rem;color:var(--gold);margin-bottom:.8rem;}
.theme-text{font-size:.9rem;line-height:2;color:rgba(255,255,255,.8);}
.theme-text strong{color:#fff;font-weight:700;}
.btn-start{display:inline-flex;align-items:center;gap:.6rem;background:linear-gradient(135deg,var(--sky),var(--mint));color:#fff;font-family:'Kaisei Decol',serif;font-size:1.3rem;font-weight:700;padding:1.1rem 2.8rem;border:none;border-radius:60px;cursor:pointer;text-decoration:none;box-shadow:0 8px 32px rgba(14,165,233,.4),0 2px 8px rgba(0,0,0,.3);transition:all .25s;animation:fadeUp .8s .6s ease both,pulse 3s 2s ease-in-out infinite;position:relative;overflow:hidden;}
.btn-start::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,.15) 50%,transparent 100%);transform:translateX(-100%);transition:transform .5s;}
.btn-start:hover::before{transform:translateX(100%);}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(14,165,233,.5),0 4px 12px rgba(0,0,0,.3);}
@keyframes pulse{0%,100%{box-shadow:0 8px 32px rgba(14,165,233,.4),0 2px 8px rgba(0,0,0,.3);}50%{box-shadow:0 8px 48px rgba(14,165,233,.7),0 2px 8px rgba(0,0,0,.3);}}

/* 中学生・大人向けリンク */
.other-link{margin-top:1.5rem;font-size:.78rem;color:rgba(255,255,255,.55);animation:fadeUp .8s .8s ease both;}
.other-link a{color:#93c5fd;text-decoration:underline;}
.other-link a:hover{color:#fff;}

footer{position:relative;z-index:1;text-align:center;padding:1.5rem;font-size:.72rem;color:rgba(255,255,255,.3);border-top:1px solid rgba(255,255,255,.08);}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* 流れ星 */
.meteor{position:fixed;width:2px;height:80px;background:linear-gradient(to bottom,rgba(255,255,255,0),#fff);border-radius:2px;animation:meteor linear infinite;pointer-events:none;z-index:0;}
.meteor:nth-child(1){left:20%;top:-80px;animation-duration:3s;animation-delay:0s;}
.meteor:nth-child(2){left:60%;top:-80px;animation-duration:4s;animation-delay:1.5s;}
.meteor:nth-child(3){left:80%;top:-80px;animation-duration:3.5s;animation-delay:3s;}
@keyframes meteor{from{transform:translateY(0) rotate(15deg);opacity:1;}to{transform:translateY(120vh) rotate(15deg);opacity:0;}}

@media(max-width:480px){.container{padding:2rem 1rem 3rem;}}
</style>
</head>
<body>
<div class="stars"></div>
<div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>

<div class="container">
  <div class="badge">🌟 2026年 夏休み 特別企画</div>
  <h1 class="main-title">夢の正体を<br>知ろう。</h1>
  <p class="sub-title">交野市の小学生に送る<br><strong>「夢プロジェクト」</strong> 夏休みの宿題</p>
  <p class="org-name">交野市PTA協議会</p>

  <div class="theme-card">
    <span class="theme-emoji">💡</span>
    <div class="theme-heading">夢って、なんだろう？</div>
    <p class="theme-text">
      「夢はお医者さん！」「サッカー選手になりたい！」<br>
      それって本当に夢？<br><br>
      <strong>夢の正体は、その仕事を通じて<br>人や社会に与える「感動」や「ありがとう」</strong><br>かもしれない。<br><br>
      このプロジェクトで、あなたの本当の夢を一緒に探してみよう！
    </p>
  </div>

  <a class="btn-start" href="yume-navi-v10.html?from=es">🚀 はじめる</a>

  <p class="other-link">
    中学生・大人の方は<a href="index-jh.html">こちら</a>
  </p>
</div>

<footer>交野市PTA協議会　夢プロジェクト実行委員会</footer>
</body>
</html>
