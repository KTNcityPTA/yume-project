<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase 送信テスト</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    padding: 24px;
    max-width: 480px;
    margin: 0 auto;
    background: #f5f5f7;
  }
  h1 {
    font-size: 20px;
  }
  button {
    width: 100%;
    padding: 18px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #007aff;
    color: white;
    margin-top: 16px;
  }
  button:disabled {
    background: #999;
  }
  #result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    white-space: pre-wrap;
    word-break: break-word;
    display: none;
  }
  .ok {
    background: #d4f4dd;
    color: #0a5c2b;
    display: block !important;
  }
  .err {
    background: #fddede;
    color: #8a1f1f;
    display: block !important;
  }
  .info {
    font-size: 13px;
    color: #666;
    margin-top: 24px;
  }
</style>
</head>
<body>

<h1>Supabase 送信テスト</h1>
<p>ボタンを押すと test_ping テーブルに1件データを送信します。</p>

<button id="sendBtn" onclick="sendTest()">送信テスト実行</button>

<div id="result"></div>

<div class="info">
  Project: jhzamiywpoczhjibbrem<br>
  Table: test_ping
</div>

<script>
const SUPABASE_URL = "https://jhzamiywpoczhjibbrem.supabase.co";
const SUPABASE_KEY = "sb_publishable_25qwG_iD39WPwnwEtpBSGA_0-24uplr";

async function sendTest() {
  const btn = document.getElementById('sendBtn');
  const result = document.getElementById('result');
  btn.disabled = true;
  btn.textContent = "送信中...";
  result.className = "";
  result.style.display = "none";

  const payload = {
    message: "iPad test " + new Date().toISOString()
  };

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/test_ping`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Prefer": "return=representation"
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      data = text;
    }

    if (res.ok) {
      result.className = "ok";
      result.textContent = "✅ 送信成功！\n\nステータス: " + res.status + "\n\n" + JSON.stringify(data, null, 2);
    } else {
      result.className = "err";
      result.textContent = "❌ 送信失敗\n\nステータス: " + res.status + "\n\n" + JSON.stringify(data, null, 2);
    }
  } catch (err) {
    result.className = "err";
    result.textContent = "❌ 通信エラー（ネットワーク/CORS/ブロックの可能性）\n\n" + err.message;
  }

  btn.disabled = false;
  btn.textContent = "送信テスト実行";
}
</script>

</body>
</html>
